<template>
    <lightning-card title="Contact Points &amp; Business Licenses" icon-name="standard:contact">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="slds-text-body_regular slds-m-bottom_small">
                Creates addresses, email addresses, phone numbers, social profiles, and
                facility/pharmacy business licenses for all demo accounts.
            </p>
            <div class="slds-box slds-box_xx-small slds-theme_info slds-m-bottom_medium">
                <div class="slds-grid slds-gutters_x-small slds-grid_vertical-align-start">
                    <div class="slds-col slds-no-flex">
                        <lightning-icon icon-name="utility:warning" size="x-small" variant="inverse" class="slds-m-right_xx-small"></lightning-icon>
                    </div>
                    <div class="slds-col">
                        <p class="slds-text-body_small"><strong>Prerequisite:</strong> Accounts &amp; Providers must be created first.</p>
                    </div>
                </div>
            </div>

            <!-- Status Section -->
            <div class="slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Current Status</h3>
                <template if:true={statusError}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <p class="slds-text-color_error">{statusError}</p>
                    </div>
                </template>
                <template if:true={statusData}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{statusData}</span>
                    </div>
                </template>
                <template if:false={statusData}>
                    <template if:false={statusError}>
                        <div class="slds-box slds-theme_shade slds-p-around_small">
                            <span class="slds-text-color_weak">Loading status...</span>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    variant="brand"
                    label="Create Contact Points & Licenses"
                    icon-name="utility:add"
                    onclick={handleCreate}
                    disabled={isLoading}
                    class="slds-m-right_small"
                    aria-label="Create contact points and business licenses">
                </lightning-button>
                <lightning-button
                    variant="destructive"
                    label="Delete Contact Points & Licenses"
                    icon-name="utility:delete"
                    onclick={handleDelete}
                    disabled={isLoading}
                    aria-label="Delete contact points and business licenses">
                </lightning-button>
            </div>

            <!-- Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-m-bottom_medium" style="height: 60px;">
                    <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
                </div>
                <template if:true={progressMessage}>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">{progressMessage}</p>
                </template>
            </template>

            <!-- Activity Log -->
            <template if:true={hasActivityLog}>
                <div class="slds-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Activity Log</h3>
                    <div class="slds-box slds-theme_shade slds-p-around_small" style="max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6;">
                        <template for:each={activityLog} for:item="entry">
                            <p key={entry.id} class="slds-m-bottom_xxx-small">
                                <template if:true={entry.isHeader}>
                                    <strong style="color: #0070d2;">{entry.message}</strong>
                                </template>
                                <template if:true={entry.isSuccess}>
                                    <span style="color: #2e844a;">&#10003; {entry.message}</span>
                                </template>
                                <template if:true={entry.isError}>
                                    <span style="color: #c23934;">&#10007; {entry.message}</span>
                                </template>
                                <template if:true={entry.isDetail}>
                                    <span style="color: #444;">&#8226; {entry.message}</span>
                                </template>
                                <template if:true={entry.isInfo}>
                                    <span style="color: #706e6b;">{entry.message}</span>
                                </template>
                            </p>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Status Messages -->
            <template if:true={resultMessage}>
                <div class={resultClass}>
                    <p>{resultMessage}</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
