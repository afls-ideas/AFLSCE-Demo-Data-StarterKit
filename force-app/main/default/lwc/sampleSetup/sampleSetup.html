<template>
    <lightning-card title="Samples" icon-name="standard:product_item">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="slds-text-body_regular slds-m-bottom_small">
                Creates Immunexis sample products (10mg and 15mg) for each country,
                with two production batches per product (expiring in 1 and 2 years).
                Also creates LifeSciMarketableProduct and ProductTerritoryAvailability
                records so samples are visible to reps in their territories.
            </p>

            <!-- Objects created by this tab -->
            <div class="slds-box slds-theme_shade slds-m-bottom_medium slds-p-around_small">
                <p class="slds-text-title_caps slds-m-bottom_x-small">Objects created by this tab</p>
                <ul class="slds-list_dotted slds-text-body_small">
                    <li><strong>Product2</strong> &mdash; Sample products (Immunexis 10mg/15mg per country, RecordType = LSC_Sample)</li>
                    <li><strong>ProductionBatch</strong> &mdash; Two batches per product with 1-year and 2-year expiration dates</li>
                    <li><strong>Location</strong> &mdash; User Inventory locations for each rep (LocationType = &lsquo;User Inventory&rsquo;)</li>
                    <li><strong>Address</strong> &mdash; Country-specific addresses for each rep inventory location</li>
                    <li><strong>ProductItem</strong> &mdash; Inventory stock records linking Product2 to rep locations (100 units each)</li>
                    <li><strong>ProductBatchItem</strong> &mdash; Links each ProductItem to its ProductionBatch</li>
                    <li><strong>LifeSciMarketableProduct</strong> &mdash; Sample-type marketable products (ProductSpecificationType = &lsquo;LSSampleProduct&rsquo;)</li>
                    <li><strong>ProductTerritoryAvailability</strong> &mdash; Aligns sample products to country territories</li>
                </ul>
            </div>

            <!-- DB Schema guidance -->
            <div class="slds-box slds-box_xx-small slds-theme_info slds-m-bottom_medium">
                <div class="slds-grid slds-gutters_x-small slds-grid_vertical-align-start">
                    <div class="slds-col slds-no-flex">
                        <lightning-icon icon-name="utility:warning" size="x-small" variant="inverse" class="slds-m-right_xx-small"></lightning-icon>
                    </div>
                    <div class="slds-col">
                        <p class="slds-text-body_small"><strong>DB Schema Configuration Required:</strong>
                            For samples to sync to the mobile app, verify that the
                            <strong>DbSchema_ProductTerritoryAvailability</strong> SOQL Filter Condition
                            is set to:</p>
                        <p class="slds-text-body_small slds-m-top_xx-small" style="font-family: monospace; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 4px;">
                            AlignmentType = 'Territory and Subordinates Inclusion'
                        </p>
                        <p class="slds-text-body_small slds-m-top_xx-small">
                            Do not include <span style="font-family: monospace;">Territory.Name = '&#123;USER.TERRITORY&#125;'</span>
                            &mdash; record sharing already controls which PTAs each rep can see.
                        </p>
                        <p class="slds-text-body_small slds-m-top_small"><strong>DB Schema for ProductBatchItem:</strong>
                            The production batch dropdown on visits requires <strong>ProductBatchItem</strong> records
                            to be synced to the mobile device. Verify that a DB Schema entry exists for
                            <strong>DbSchema_ProductBatchItem</strong> in Admin Console &gt; DB Schema.
                            If missing, add it with no SOQL filter condition.</p>
                        <p class="slds-text-body_small slds-m-top_small">
                            After configuring both DB Schema entries, regenerate the metadata cache and have reps re-sync.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Status Section -->
            <div class="slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Current Status</h3>
                <template if:true={statusError}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <p class="slds-text-color_error">{statusError}</p>
                    </div>
                </template>
                <template if:true={statusData}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{statusData}</span>
                    </div>
                </template>
                <template if:false={statusData}>
                    <template if:false={statusError}>
                        <div class="slds-box slds-theme_shade slds-p-around_small">
                            <span class="slds-text-color_weak">Loading status...</span>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    variant="brand"
                    label="Create Samples"
                    icon-name="utility:add"
                    onclick={handleCreate}
                    disabled={isLoading}
                    class="slds-m-right_small"
                    aria-label="Create sample products and production batches">
                </lightning-button>
                <lightning-button
                    variant="destructive"
                    label="Delete Samples"
                    icon-name="utility:delete"
                    onclick={handleDelete}
                    disabled={isLoading}
                    aria-label="Delete sample products and production batches">
                </lightning-button>
            </div>

            <!-- Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-m-bottom_medium" style="height: 60px;">
                    <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Activity Log -->
            <template if:true={hasActivityLog}>
                <div class="slds-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Activity Log</h3>
                    <div class="slds-box slds-theme_shade slds-p-around_small" style="max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6;">
                        <template for:each={activityLog} for:item="entry">
                            <p key={entry.id} class="slds-m-bottom_xxx-small">
                                <template if:true={entry.isHeader}>
                                    <strong style="color: #0070d2;">{entry.message}</strong>
                                </template>
                                <template if:true={entry.isSuccess}>
                                    <span style="color: #2e844a;">&#10003; {entry.message}</span>
                                </template>
                                <template if:true={entry.isError}>
                                    <span style="color: #c23934;">&#10007; {entry.message}</span>
                                </template>
                                <template if:true={entry.isDetail}>
                                    <span style="color: #444;">&#8226; {entry.message}</span>
                                </template>
                            </p>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Status Messages -->
            <template if:true={resultMessage}>
                <div class={resultClass}>
                    <p>{resultMessage}</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
