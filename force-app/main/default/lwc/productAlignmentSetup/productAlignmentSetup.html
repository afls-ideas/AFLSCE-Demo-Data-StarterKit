<template>
    <lightning-card title="Product Alignment" icon-name="standard:product">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="slds-text-body_regular slds-m-bottom_small">
                Creates Immunexis (Autoimmune) and Immunonco (Oncology) brand products for each country,
                then aligns them with the corresponding country territories via ProductTerritoryAvailability.
            </p>
            <div class="slds-box slds-box_x-small slds-theme_alert-texture slds-m-bottom_medium">
                <lightning-icon icon-name="utility:warning" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                <span class="slds-text-body_small"><strong>After creating:</strong> Run the Product Alignment Job from
                Admin Console &gt; Product (tile) &gt; Product Alignment Jobs to generate detail records (PTDAs)
                for leaf territories.</span>
            </div>

            <!-- Status Section -->
            <div class="slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Current Status</h3>
                <template if:true={statusError}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <p class="slds-text-color_error">{statusError}</p>
                    </div>
                </template>
                <template if:true={statusData}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{statusData}</span>
                    </div>
                </template>
                <template if:false={statusData}>
                    <template if:false={statusError}>
                        <div class="slds-box slds-theme_shade slds-p-around_small">
                            <span class="slds-text-color_weak">Loading status...</span>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    variant="brand"
                    label="Create Products &amp; Align"
                    icon-name="utility:add"
                    onclick={handleCreate}
                    disabled={isLoading}
                    class="slds-m-right_small"
                    aria-label="Create products and territory alignments">
                </lightning-button>
                <lightning-button
                    variant="destructive"
                    label="Delete Products &amp; Alignments"
                    icon-name="utility:delete"
                    onclick={handleDelete}
                    disabled={isLoading}
                    aria-label="Delete products and territory alignments">
                </lightning-button>
            </div>

            <!-- Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-m-bottom_medium" style="height: 60px;">
                    <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Status Messages -->
            <template if:true={resultMessage}>
                <div class={resultClass}>
                    <p>{resultMessage}</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
