<template>
    <lightning-card title="Territory Hierarchy Setup" icon-name="standard:location">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="slds-text-body_regular slds-m-bottom_small">
                Creates a complete territory hierarchy including a GLOBAL root, 11 country territories
                (US, GB, FR, DE, IT, ES, JP, KR, BR, MX, AR), Medical specialty territories, and KAM (Key Account Management) structure.
                US has regional territories; international countries have 3 city-level territories each.
            </p>

            <!-- Objects created by this tab -->
            <div class="slds-box slds-theme_shade slds-m-bottom_medium slds-p-around_small">
                <p class="slds-text-title_caps slds-m-bottom_x-small">Objects created by this tab</p>
                <ul class="slds-list_dotted slds-text-body_small">
                    <li><strong>Territory2</strong> &mdash; GLOBAL root, 11 country territories, US regional territories, Medical specialty territories, and KAM territories</li>
                </ul>
            </div>

            <!-- Status Section -->
            <div class="slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Current Status</h3>
                <template if:true={statusError}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <p class="slds-text-color_error">{statusError}</p>
                    </div>
                </template>
                <template if:true={statusData}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{statusData}</span>
                    </div>
                </template>
                <template if:false={statusData}>
                    <template if:false={statusError}>
                        <div class="slds-box slds-theme_shade slds-p-around_small">
                            <span class="slds-text-color_weak">Loading status...</span>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    variant="brand"
                    label="Create Territory Hierarchy"
                    icon-name="utility:add"
                    onclick={handleCreate}
                    disabled={isLoading}
                    class="slds-m-right_small"
                    aria-label="Create territory hierarchy">
                </lightning-button>
            </div>

            <!-- Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-m-bottom_medium" style="height: 60px;">
                    <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Status Messages -->
            <template if:true={resultMessage}>
                <div class={resultClass}>
                    <p>{resultMessage}</p>
                </div>
            </template>

            <!-- Territory Hierarchy Tree -->
            <template if:true={hasTreeItems}>
                <div class="slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Territory Hierarchy</h3>
                    <div class="slds-box slds-p-around_small" style="max-height: 500px; overflow-y: auto;">
                        <lightning-tree
                            items={treeItems}
                            header="">
                        </lightning-tree>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
