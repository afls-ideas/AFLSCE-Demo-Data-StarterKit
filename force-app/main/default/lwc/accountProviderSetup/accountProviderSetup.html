<template>
    <lightning-card title="Accounts &amp; Healthcare Providers" icon-name="standard:account">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="slds-text-body_regular slds-m-bottom_small">
                Creates ~365 accounts (hospitals, clinics, payers, pharmacies across US, GB, FR, DE, IT, ES, JP, KR, BR, MX, AR)
                and Healthcare Providers with NPIs, specialties, and organizational affiliations.
            </p>

            <!-- Objects created by this tab -->
            <div class="slds-box slds-theme_shade slds-m-bottom_medium slds-p-around_small">
                <p class="slds-text-title_caps slds-m-bottom_x-small">Objects created by this tab</p>
                <ul class="slds-list_dotted slds-text-body_small">
                    <li><strong>Account</strong> &mdash; Organization accounts (hospitals, clinics, payers, pharmacies) and HCP person accounts</li>
                    <li><strong>HealthcareProvider</strong> &mdash; Professional provider record linked to each HCP person account</li>
                    <li><strong>HealthcareProviderNpi</strong> &mdash; NPI (National Provider Identifier) for each provider</li>
                    <li><strong>CareSpecialty</strong> &mdash; Medical specialties (Oncology, Cardiology, Neurology, etc.)</li>
                    <li><strong>HealthcareProviderSpecialty</strong> &mdash; Links each provider to their primary specialty</li>
                    <li><strong>ProviderAffiliation</strong> &mdash; Links HCP doctors to their affiliated organization accounts</li>
                </ul>
                <p class="slds-text-title_caps slds-m-top_small slds-m-bottom_x-small">Created by &ldquo;Assign Territories&rdquo;</p>
                <ul class="slds-list_dotted slds-text-body_small">
                    <li><strong>ObjectTerritory2Association</strong> &mdash; Assigns accounts to their geographic territory</li>
                    <li><strong>ProviderAcctTerritoryInfo</strong> &mdash; Territory targeting and offline availability per account</li>
                    <li><strong>PrvdAccountTerritorySummary</strong> &mdash; Account summaries with key info and discussion points for reps</li>
                </ul>
            </div>

            <!-- Record Type Selection -->
            <template if:true={hasRecordTypes}>
                <div class="slds-box slds-theme_shade slds-m-bottom_medium slds-p-around_small">
                    <p class="slds-text-title_caps slds-m-bottom_small">Record Type Configuration</p>
                    <div class="slds-grid slds-gutters_medium slds-wrap">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                            <lightning-radio-group
                                label="HCO (Organization) Record Type"
                                name="hcoRecordType"
                                options={hcoOptions}
                                value={hcoRecordTypeId}
                                onchange={handleHcoChange}
                                type="radio">
                            </lightning-radio-group>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                            <lightning-radio-group
                                label="HCP (Provider) Record Type"
                                name="hcpRecordType"
                                options={hcpOptions}
                                value={hcpRecordTypeId}
                                onchange={handleHcpChange}
                                type="radio">
                            </lightning-radio-group>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Status Section -->
            <div class="slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Current Status</h3>
                <template if:true={statusError}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <p class="slds-text-color_error">{statusError}</p>
                    </div>
                </template>
                <template if:true={statusData}>
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{statusData}</span>
                    </div>
                </template>
                <template if:false={statusData}>
                    <template if:false={statusError}>
                        <div class="slds-box slds-theme_shade slds-p-around_small">
                            <span class="slds-text-color_weak">Loading status...</span>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Territory Warning -->
            <div class="slds-box slds-box_xx-small slds-theme_info slds-m-bottom_medium">
                <div class="slds-grid slds-gutters_x-small slds-grid_vertical-align-start">
                    <div class="slds-col slds-no-flex">
                        <lightning-icon icon-name="utility:warning" size="x-small" variant="inverse" class="slds-m-right_xx-small"></lightning-icon>
                    </div>
                    <div class="slds-col">
                        <p class="slds-text-body_small"><strong>Before running "Assign Territories":</strong>
                            Assign users to their territories first
                            (Setup &gt; Territory Models &gt; LSC Territory Model &gt; each leaf territory &gt; Manage Users).
                            The Provider Account Territory Summary (PATS) record is created per user per territory &mdash;
                            if no users are assigned, reps will see "No data available" on the Provider Summary card in mobile.</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    variant="brand"
                    label="Create Accounts &amp; Providers"
                    icon-name="utility:add"
                    onclick={handleCreate}
                    disabled={isCreateDisabled}
                    class="slds-m-right_small"
                    aria-label="Create accounts and healthcare providers">
                </lightning-button>
                <lightning-button
                    variant="neutral"
                    label="Assign Territories"
                    icon-name="utility:location"
                    onclick={handleAssignTerritories}
                    disabled={isLoading}
                    class="slds-m-right_small"
                    aria-label="Assign accounts to matching territories">
                </lightning-button>
                <lightning-button
                    variant="destructive"
                    label="Delete Accounts &amp; Providers"
                    icon-name="utility:delete"
                    onclick={handleDelete}
                    disabled={isLoading}
                    aria-label="Delete accounts and healthcare providers">
                </lightning-button>
            </div>

            <!-- Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-m-bottom_medium" style="height: 60px;">
                    <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Status Messages -->
            <template if:true={resultMessage}>
                <div class={resultClass}>
                    <p>{resultMessage}</p>
                </div>
            </template>

            <!-- Territory Data Summary Table -->
            <template if:true={hasSummaryRows}>
                <div class="slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Territory Data Summary</h3>
                    <div class="slds-box slds-p-around_none" style="max-height: 500px; overflow-y: auto;">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped slds-table_fixed-layout">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col" style="width: 22%"><div class="slds-truncate" title="Territory">Territory</div></th>
                                    <th scope="col" style="width: 14%"><div class="slds-truncate" title="Region">Region</div></th>
                                    <th scope="col" style="width: 18%"><div class="slds-truncate" title="Assigned User">Assigned User</div></th>
                                    <th scope="col" style="width: 7%" class="slds-text-align_center"><div class="slds-truncate" title="HCPs">HCPs</div></th>
                                    <th scope="col" style="width: 7%" class="slds-text-align_center"><div class="slds-truncate" title="HCOs">HCOs</div></th>
                                    <th scope="col" style="width: 8%" class="slds-text-align_center"><div class="slds-truncate" title="PATI">PATI</div></th>
                                    <th scope="col" style="width: 8%" class="slds-text-align_center"><div class="slds-truncate" title="PATS">PATS</div></th>
                                    <th scope="col" style="width: 8%" class="slds-text-align_center"><div class="slds-truncate" title="Affiliations">Affils</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={summaryRows} for:item="row">
                                    <tr key={row.territoryName}>
                                        <td><div class="slds-truncate" title={row.territoryName}>{row.territoryName}</div></td>
                                        <td><div class="slds-truncate" title={row.parentName}>{row.parentName}</div></td>
                                        <td><div class="slds-truncate" title={row.assignedUser}>{row.assignedUser}</div></td>
                                        <td class="slds-text-align_center">{row.hcpCount}</td>
                                        <td class="slds-text-align_center">{row.hcoCount}</td>
                                        <td class="slds-text-align_center">{row.patiCount}</td>
                                        <td class="slds-text-align_center">{row.patsCount}</td>
                                        <td class="slds-text-align_center">{row.affiliationCount}</td>
                                    </tr>
                                </template>
                            </tbody>
                            <template if:true={summaryTotals}>
                                <tfoot>
                                    <tr class="slds-text-title_caps">
                                        <td colspan="3"><strong>Totals</strong></td>
                                        <td class="slds-text-align_center"><strong>{summaryTotals.hcp}</strong></td>
                                        <td class="slds-text-align_center"><strong>{summaryTotals.hco}</strong></td>
                                        <td class="slds-text-align_center"><strong>{summaryTotals.pati}</strong></td>
                                        <td class="slds-text-align_center"><strong>{summaryTotals.pats}</strong></td>
                                        <td class="slds-text-align_center"><strong>{summaryTotals.affl}</strong></td>
                                    </tr>
                                </tfoot>
                            </template>
                        </table>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
